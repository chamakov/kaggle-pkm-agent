<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CABT Battle Visualizer Uploader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f16;
            --card-bg: rgba(25, 25, 40, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 50%, #1e1e30 0%, var(--bg-color) 100%);
            color: var(--text-color);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .dropzone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 3rem 2rem;
            background: rgba(99, 102, 241, 0.02);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.06);
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .dropzone:hover .dropzone-icon {
            transform: scale(1.1);
        }

        .dropzone-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .dropzone-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #fileInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>PTCG Replay Visualizer</h1>
            <p>Upload your <code>replay.json</code> or <code>vis.json</code> simulation file to view the battle dynamically on the PTCG Visualizer.</p>
            
            <div class="dropzone" id="dropzone">
                <span class="dropzone-icon">🚀</span>
                <div class="dropzone-text">Drag & drop your file here</div>
                <div class="dropzone-subtext">or click to browse from your computer</div>
                <input type="file" id="fileInput" accept=".json">
            </div>
        </div>
        <div class="footer">
            CABT Local Simulator Interface &bull; Open-source helper
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
            }, false);
        });

        fileInput.addEventListener('change', function(event) {
            prepareAndHandleFile(event.target.files[0]);
        });

        dropzone.addEventListener('drop', function(event) {
            const dt = event.dataTransfer;
            const file = dt.files[0];
            prepareAndHandleFile(file);
        });

        function prepareAndHandleFile(file) {
            if (!file) return;

            // Open window synchronously to bypass browser popup blockers
            const newWindow = window.open("about:blank", "_blank");
            if (!newWindow) {
                alert("Popup blocked! Please allow popups for this page to view the replay.");
                return;
            }

            // Set a unique target name
            const windowTargetName = "ptcg_replay_window_" + Date.now();
            newWindow.name = windowTargetName;

            // Show a loading text in the new window while we process the JSON
            newWindow.document.write("<html><head><title>Loading Replay...</title><style>body{background:#0f0f16;color:#f3f4f6;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;} .loader{text-align:center;} h2{font-weight:300;letter-spacing:1px;}</style></head><body><div class='loader'><h2>Loading battle replay...</h2><p style='color:#9ca3af;'>Please wait while the file is processed and submitted to the visualizer.</p></div></body></html>");
            newWindow.document.close();

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const obj = JSON.parse(e.target.result);

                    const input = document.createElement("input");
                    input.type = "hidden";
                    input.name = "json";
                    if ("steps" in obj) {
                        input.value = JSON.stringify(obj["steps"][0][0]["visualize"]);
                    } else {
                        input.value = e.target.result;
                    }

                    const form = document.createElement("form");
                    form.method = "POST";
                    form.action = "https://ptcgvis.heroz.jp/Visualizer/Replay/0";
                    form.target = windowTargetName;
                    form.appendChild(input);

                    document.body.appendChild(form);
                    form.submit();
                    document.body.removeChild(form);
                } catch (err) {
                    newWindow.close();
                    alert("Error parsing JSON file. Please ensure it is a valid CABT replay or visualization JSON.");
                    console.error(err);
                }
            };
            reader.onerror = function() {
                newWindow.close();
                alert("Error reading file.");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
