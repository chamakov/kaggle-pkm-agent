<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon CABT Valid Cards Dashboard</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Header -->
        <header class="glass-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#00E5FF" stroke-width="2"/>
                    <path d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z" stroke="#00E5FF" stroke-width="2"/>
                    <path d="M2 12H8" stroke="#00E5FF" stroke-width="2"/>
                    <path d="M16 12H22" stroke="#00E5FF" stroke-width="2"/>
                </svg>
                <h1>CABT Engine Explorer</h1>
            </div>
            
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name, ID, or type...">
                </div>
                
                <div class="filter-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="validOnlyToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">Show Valid Cards Only</span>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-value" id="totalCount">0</span>
                    <span class="stat-label">Cards Found</span>
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="grid-container" id="cardsContainer">
            <!-- Cards will be injected here via JS -->
        </main>
    </div>

    <!-- Data and App Logic -->
    <script src="cards.js"></script>
    <script src="app.js"></script>
</body>
</html>
